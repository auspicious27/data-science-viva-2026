<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Data Science ML AI Viva 2026</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --paper: #ffffff;
      --text: #172033;
      --muted: #5f6b7a;
      --border: #dbe2ef;
      --accent: #2563eb;
      --accent-dark: #1e40af;
      --code-bg: #0f172a;
      --code-text: #e5e7eb;
      --table-head: #eef4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.7;
    }
    header {
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #fff;
      padding: 26px 18px;
      border-bottom: 5px solid var(--accent);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }
    header h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.25;
      color: #ffffff;
    }
    header p {
      margin: 8px 0 0;
      color: #dbeafe;
      font-size: 16px;
    }
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .toc {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    .toc h2 {
      margin: 0 0 10px;
      color: #111827;
      font-size: 18px;
    }
    .toc p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .toc ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .toc li {
      margin: 0;
      font-size: 14px;
    }
    .toc a {
      display: block;
      color: #1f2937;
      text-decoration: none;
      border-radius: 6px;
      padding: 7px 8px;
      line-height: 1.35;
    }
    .toc a:hover,
    .toc a.active {
      background: #eaf1ff;
      color: var(--accent-dark);
    }
    .toc .toc-section > a {
      margin-top: 6px;
      color: #0f172a;
      font-weight: 700;
      border-left: 3px solid var(--accent);
    }
    .toc .toc-sub {
      margin: 3px 0 8px 10px;
      padding-left: 9px;
      border-left: 1px solid var(--border);
    }
    .toc .toc-sub a {
      color: var(--muted);
      font-size: 13px;
      padding: 6px 7px;
    }
    article {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    h1, h2, h3 {
      color: #111827;
      line-height: 1.25;
    }
    article > h1:first-child {
      margin-top: 0;
    }
    h1 {
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
      margin-top: 36px;
      scroll-margin-top: 20px;
    }
    h2 {
      margin-top: 30px;
      color: var(--accent-dark);
      scroll-margin-top: 20px;
    }
    h3 {
      margin-top: 22px;
    }
    p, li {
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      margin: 18px 0;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: var(--table-head);
    }
    code {
      background: #edf2f7;
      border-radius: 4px;
      padding: 2px 5px;
      font-family: Consolas, Monaco, monospace;
    }
    pre {
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }
    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }
    blockquote {
      border-left: 4px solid var(--accent);
      margin: 18px 0;
      padding: 8px 16px;
      background: #f8fbff;
      color: var(--muted);
    }
    .loading, .error {
      color: var(--muted);
      font-size: 18px;
    }
    .error {
      color: #b91c1c;
    }
    @media (max-width: 760px) {
      header h1 { font-size: 23px; }
      article { padding: 18px; }
      main {
        display: block;
        padding: 16px 10px 32px;
      }
      .toc {
        position: relative;
        top: auto;
        max-height: 340px;
        margin-bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Data Science with Machine Learning and AI Viva 2026</h1>
      <p>Complete Simple Hinglish viva questions, theory, practical explanations, sessions, datasets, and capstone coverage.</p>
    </div>
  </header>
  <main>
    <aside class="toc" aria-label="Module and topic navigation">
      <h2>Modules & Topics</h2>
      <p>Click karo, direct us module/topic par page scroll ho jayega.</p>
      <nav id="toc-list">
        <p class="loading">Loading menu...</p>
      </nav>
    </aside>
    <article id="content">
      <p class="loading">Loading notes...</p>
    </article>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const content = document.getElementById("content");
    const tocList = document.getElementById("toc-list");

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function makeUniqueId(base, usedIds) {
      let id = base || "section";
      let counter = 2;
      while (usedIds.has(id)) {
        id = `${base}-${counter}`;
        counter += 1;
      }
      usedIds.add(id);
      return id;
    }

    function buildTableOfContents() {
      const usedIds = new Set();
      const headings = [...content.querySelectorAll("h1, h2")];
      let currentSection = null;
      const root = document.createElement("ul");

      headings.forEach((heading) => {
        heading.id = makeUniqueId(slugify(heading.textContent), usedIds);

        if (heading.tagName === "H1") {
          currentSection = document.createElement("li");
          currentSection.className = "toc-section";

          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent;
          currentSection.appendChild(link);

          const subList = document.createElement("ul");
          subList.className = "toc-sub";
          currentSection.appendChild(subList);
          root.appendChild(currentSection);
        }

        if (heading.tagName === "H2") {
          if (!currentSection) {
            currentSection = document.createElement("li");
            currentSection.className = "toc-section";
            const subList = document.createElement("ul");
            subList.className = "toc-sub";
            currentSection.appendChild(subList);
            root.appendChild(currentSection);
          }

          const subItem = document.createElement("li");
          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent;
          subItem.appendChild(link);
          currentSection.querySelector(".toc-sub").appendChild(subItem);
        }
      });

      tocList.innerHTML = "";
      tocList.appendChild(root);
      setupActiveLinks();

      if (window.location.hash) {
        const target = document.getElementById(window.location.hash.slice(1));
        if (target) {
          requestAnimationFrame(() => target.scrollIntoView({ behavior: "smooth", block: "start" }));
        }
      }
    }

    function setupActiveLinks() {
      const links = [...tocList.querySelectorAll("a")];
      const headings = links
        .map((link) => document.getElementById(link.getAttribute("href").slice(1)))
        .filter(Boolean);

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            links.forEach((link) => link.classList.remove("active"));
            const activeLink = links.find((link) => link.getAttribute("href") === `#${entry.target.id}`);
            if (activeLink) activeLink.classList.add("active");
          }
        });
      }, { rootMargin: "-20% 0px -70% 0px" });

      headings.forEach((heading) => observer.observe(heading));
    }

    fetch("README.md", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) {
          throw new Error("README.md file could not be loaded.");
        }
        return response.text();
      })
      .then((markdown) => {
        content.innerHTML = marked.parse(markdown);
        try {
          buildTableOfContents();
        } catch (error) {
          tocList.innerHTML = `<p class="error">Menu could not be loaded: ${error.message}</p>`;
        }
      })
      .catch((error) => {
        content.innerHTML = `<h1>Notes could not be loaded</h1><p class="error">${error.message}</p>`;
      });
  </script>
</body>
</html>
